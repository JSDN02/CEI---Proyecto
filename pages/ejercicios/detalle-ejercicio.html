DETALLE-EJERCICIO.HTML - PÁGINA DE DETALLE DE EJERCICIO
========================================================
Descripción:
Página de detalle individual de un ejercicio específico.

Funcionalidad:
- Visualización dinámica de datos del ejercicio
- Carrusel de imágenes/videos
- Sistema de acordeón para variaciones
- Información técnica y consejos

Dependencias:
